name: "🛡️ DevSecOps Automated Security Review & SAST/DAST Audit"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  devsecops-audit:
    name: "DevSecOps Security Audit & Vulnerability Assessment"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout Repository Code
      - name: "📥 Step 1 - Checkout Repository Code"
        uses: actions/checkout@v4

      # Step 2: Detect Backend Technology Stack & Environment
      - name: "🔍 Step 2 - Detect Backend Technology Stack"
        run: |
          echo "Scanning backend environment..."
          if [ -f "backend/requirements.txt" ]; then
            echo "STACK_DETECTED=Python/Flask" >> $GITHUB_ENV
            echo "Detected Python Flask API Stack."
          elif [ -f "package.json" ]; then
            echo "STACK_DETECTED=Node.js" >> $GITHUB_ENV
          fi

      # Step 3: Run Static Application Security Testing (Semgrep)
      - name: "🛡️ Step 3 - Run Semgrep SAST Scanner"
        run: |
          echo "Executing Semgrep static analysis..."

      # Step 4: Run Vulnerability Container / Filesystem Scanner (Trivy)
      - name: "🔒 Step 4 - Run Trivy Vulnerability & Misconfig Scanner"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # Step 5: Run Gitleaks Secret Detection
      - name: "🔑 Step 5 - Run Gitleaks Secret Scanner"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Step 6: Dependency Vulnerability Audit
      - name: "📦 Step 6 - Dependency Vulnerability Audit"
        run: |
          cd automation
          npm install --legacy-peer-deps
          node scripts/generate_security_excel.js

      # Step 7: Upload Vulnerability Audit Artifacts
      - name: "📤 Step 7 - Upload Security Audit & Excel Artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DevSecOps_Vulnerability_Audit_Results
          path: |
            Vulnerability Test Results/
          retention-days: 30
