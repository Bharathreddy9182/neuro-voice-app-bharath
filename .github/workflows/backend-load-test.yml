name: ⚙️ Backend Baseline & Load Testing CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  backend-load-testing:
    name: Backend API & Load Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11 Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Backend Dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install flask flask-cors bcrypt pyjwt

      - name: 🚀 Start Backend API Server
        run: |
          cd backend
          python app.py &
          sleep 3

      - name: ⚡ Run Baseline Load Test (100 Concurrent Virtual Users)
        run: |
          cd backend
          python load_test.py --url http://127.0.0.1:5000 --users 100 --duration 30
