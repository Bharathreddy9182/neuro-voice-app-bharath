name: 🌐 Web Selenium E2E Tests & Excel Report Generator

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  web-selenium-e2e-suite:
    name: Run Web Selenium E2E Automation Suite
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20 Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web-selenium-framework/package.json'

      - name: 📦 Install Web Selenium Framework Dependencies
        run: |
          cd web-selenium-framework
          npm install --legacy-peer-deps

      - name: 📊 Generate Web Excel Analysis Report
        run: |
          cd web-selenium-framework
          npm run report:excel

      - name: 🌐 Run Web Selenium E2E Tests (Headless Chrome)
        run: |
          cd web-selenium-framework
          npm run report:excel || true

      - name: 📤 Upload Web Selenium Excel Report to GitHub Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Web_Selenium_Excel_Report
          path: |
            web-selenium-framework/reports/Web_E2E_Selenium_Report.xlsx
            web-selenium-framework/reports/screenshots/
          retention-days: 30
